    <title>ChocoBot - Tienda Oficial</title>

    <script type="module">

        createChat({
            webhookUrl: 'https://andrea-nuclio.app.n8n.cloud/webhook/c2443a34-512c-42d8-b107-4a99c06500c3/chat',
            mode: 'window', 
            showWelcomeScreen: true,
            initialMessages: [
                '¡Hola! Soy ChocoBot. 🍫 ¿En qué puedo ayudarte hoy?'
